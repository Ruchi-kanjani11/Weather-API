<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
}

/* container */

.weather{
width:650px;
display:flex;
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

/* left panel */

.left{
flex:1;
background:linear-gradient(135deg,#3b82f6,#06b6d4);
color:white;
padding:40px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.left .temp{
    font-size:70px;
    font-weight:600;
}

.left .desc{
font-size:20px;
margin-top:10px;
}

.left .city{
font-size:22px;
margin-top:10px;
opacity:0.9;
}

/* right panel */

.right{
flex:1;
background:white;
padding:40px;
display:flex;
flex-direction:column;
justify-content:center;
}

.search{
display:flex;
gap:10px;
margin-bottom:25px;
}

.search input{
flex:1;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
outline:none;
}

.search button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.search button:hover{
background:#2563eb;
}

/* weather icon */

.icon{
font-size:60px;
text-align:center;
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="weather">

<div class="left" id="weather-bg">

<div class="icon">☀️</div>

<div class="temp" id="temperature">--°C</div>

<div class="desc" id="description">Weather</div>

<div class="city" id="city-name">Search a city</div>

</div>

<div class="right">

<div class="search">
<input type="text" id="city" placeholder="Enter city name">
<button id="get-weather">Search</button>
</div>

<p style="color:#666;">
Search for any city to see the current weather conditions.
</p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
